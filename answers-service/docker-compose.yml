services:
  answers-migrate:
    build:
      context: ..
      dockerfile: answers-service/Dockerfile
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  answers-service:
    build:
      context: ..
      dockerfile: answers-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8006:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      answers-migrate:
        condition: service_completed_successfully
    volumes:
      - ./keys:/app/keys
      - ./storage:/app/storage

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: answers
      POSTGRES_PASSWORD: answers
      POSTGRES_DB: answers
    ports:
      - "5437:5432"
    volumes:
      - answers_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U answers"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  answers_db_data:
