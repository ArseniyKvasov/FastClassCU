# FastClass reverse proxy — cu.fastclass.ru
#
# Only frontend-service is meant to be public (see ../../CHECKLIST.md), with
# two exceptions that must be routed through here too:
#   - /auth/*        -> auth-service   (Yandex/VK OAuth redirect callback,
#                                        browser must be able to reach it)
#   - /ws/collab,
#     /collab/*      -> collaboration-service (browser connects directly
#                                        for real-time collaborative editing)
# Everything else -> frontend-service.
#
# Assumes each service's docker-compose.yml is running on this same host and
# reachable via the ports it publishes to localhost (see CHECKLIST.md §
# Порты). Adjust upstream addresses if services run on separate hosts.
#
# Ships HTTP-only on purpose: `certbot --nginx -d cu.fastclass.ru` (see
# DEPLOYMENT.md) reads this file, obtains the certificate, and rewrites it
# in place to add the `listen 443 ssl` block + the http->https redirect.
# Don't hand-add a 443 server block before running certbot — nginx will
# refuse to start with `ssl_certificate` pointing at files that don't exist
# yet.

upstream fastclass_frontend {
    server 127.0.0.1:8080;
}

upstream fastclass_auth {
    server 127.0.0.1:8001;
}

upstream fastclass_collaboration {
    server 127.0.0.1:8007;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name cu.fastclass.ru;

    client_max_body_size 20m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # OAuth callback + auth API — must stay public for the Yandex/VK
    # redirect to land on auth-service directly.
    location /auth/ {
        proxy_pass http://fastclass_auth;
    }

    # Collaborative-editing WebSocket (Yjs/Hocuspocus).
    location /ws/collab {
        proxy_pass http://fastclass_collaboration;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # Collaborative-editing session token issuance (POST /collab/sessions).
    location /collab/ {
        proxy_pass http://fastclass_collaboration;
    }

    # Everything else — the SPA + its BFF (frontend-service).
    location / {
        proxy_pass http://fastclass_frontend;
    }
}
