services:
  classroom-migrate:
    build:
      context: ..
      dockerfile: classroom-service/Dockerfile
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  classroom-service:
    build:
      context: ..
      dockerfile: classroom-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8004:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      classroom-migrate:
        condition: service_completed_successfully
    volumes:
      - ./keys:/app/keys

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: classroom
      POSTGRES_PASSWORD: classroom
      POSTGRES_DB: classroom
    ports:
      - "5435:5432"
    volumes:
      - classroom_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U classroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  classroom_db_data:
