services:
  ai-assistant-migrate:
    build:
      context: ..
      dockerfile: ai-assistant-service/Dockerfile
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  ai-assistant-service:
    build:
      context: ..
      dockerfile: ai-assistant-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-assistant-migrate:
        condition: service_completed_successfully
    volumes:
      - ./keys:/app/keys

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: ai_assistant
    ports:
      - "5438:5432"
    volumes:
      - ai_assistant_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ai_assistant_db_data:
