services:
  content-migrate:
    build:
      context: ..
      dockerfile: content-service/Dockerfile
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  content-service:
    build:
      context: ..
      dockerfile: content-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      content-migrate:
        condition: service_completed_successfully
    volumes:
      - ./storage:/app/storage
      - ../auth-service/keys:/app/keys:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: content
      POSTGRES_PASSWORD: content
      POSTGRES_DB: content
    ports:
      - "5434:5432"
    volumes:
      - content_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  content_db_data:
