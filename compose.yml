      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/answers
      REDIS_URL: redis://redis:6379/4
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      CONTENT_SERVICE_BASE_URL: http://content-service:8000
      AUTH_SERVICE_BASE_URL: http://auth-service:8000
      CLASSROOM_SERVICE_BASE_URL: http://classroom-service:8000
      ASSIGNMENTS_SERVICE_BASE_URL: http://assignments-service:8000
      SERVICE_CLIENT_SECRET: ${ANSWERS_SERVICE_CLIENT_SECRET}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys:ro
      - ./answers-service/storage:/app/storage
    restart: "no"

  answers-service:
    build:
      context: .
      dockerfile: answers-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/answers
      REDIS_URL: redis://redis:6379/4
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      CONTENT_SERVICE_BASE_URL: http://content-service:8000
      AUTH_SERVICE_BASE_URL: http://auth-service:8000
      CLASSROOM_SERVICE_BASE_URL: http://classroom-service:8000
      ASSIGNMENTS_SERVICE_BASE_URL: http://assignments-service:8000
      SERVICE_CLIENT_SECRET: ${ANSWERS_SERVICE_CLIENT_SECRET}
    ports:
