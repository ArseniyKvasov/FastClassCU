    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/assignments
      REDIS_URL: redis://redis:6379/3
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      CLASSROOM_SERVICE_BASE_URL: http://classroom-service:8000
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys:ro
    restart: "no"

  assignments-service:
    build:
      context: .
      dockerfile: assignments-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/assignments
      REDIS_URL: redis://redis:6379/3
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      CLASSROOM_SERVICE_BASE_URL: http://classroom-service:8000
    ports:
