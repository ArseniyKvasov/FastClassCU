services:
  keys-init:
    image: python:3.12-slim
    working_dir: /src/auth-service
    volumes:
      - .:/src
    command: >
      sh -c 'pip install --quiet cryptography &&
      [ -f keys/private.pem ] || python scripts/generate_keys.py'
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck: &postgres_healthcheck
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck: &redis_healthcheck
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-migrate:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/auth
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REDIS_URL: redis://redis:6379/1
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys
    restart: "no"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/auth
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REDIS_URL: redis://redis:6379/1
    ports:
      - "${AUTH_PORT:-8001}:8000"
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    volumes:
      - ./auth-service/keys:/app/keys

  content-migrate:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/content
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys:ro
    restart: "no"

  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/content
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
    ports:
      - "${CONTENT_PORT:-8003}:8000"
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      content-migrate:
        condition: service_completed_successfully
    volumes:
      - ./content-service/storage:/app/storage
      - ./auth-service/keys:/app/keys:ro

  classroom-migrate:
    build:
      context: .
      dockerfile: classroom-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/classroom
      REDIS_URL: redis://redis:6379/2
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REDIS_URL: ${CLASSROOM_RATE_LIMIT_REDIS_URL:-redis://redis:6379/2}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys:ro
    restart: "no"

  classroom-service:
    build:
      context: .
      dockerfile: classroom-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/classroom
      REDIS_URL: redis://redis:6379/2
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REDIS_URL: ${CLASSROOM_RATE_LIMIT_REDIS_URL:-redis://redis:6379/2}
    ports:
      - "${CLASSROOM_PORT:-8004}:8000"
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
