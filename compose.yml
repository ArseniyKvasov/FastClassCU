      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/collaboration
      REDIS_URL: redis://redis:6379/6
      ANSWERS_SERVICE_BASE_URL: http://answers-service:8000
      AUTH_SERVICE_BASE_URL: http://auth-service:8000
      CLASSROOM_SERVICE_BASE_URL: http://classroom-service:8000
      ASSIGNMENTS_SERVICE_BASE_URL: http://assignments-service:8000
      SERVICE_CLIENT_SECRET: ${COLLABORATION_SERVICE_CLIENT_SECRET}
