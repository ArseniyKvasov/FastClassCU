      - ./answers-service/storage:/app/storage

  ai-assistant-migrate:
    build:
      context: .
      dockerfile: ai-assistant-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_assistant
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_REDIS_URL: ${AI_ASSISTANT_RATE_LIMIT_REDIS_URL:-redis://redis:6379/5}
      CONTENT_SERVICE_BASE_URL: http://content-service:8000
      AUTH_SERVICE_BASE_URL: http://auth-service:8000
      SERVICE_CLIENT_SECRET: ${AI_ASSISTANT_SERVICE_CLIENT_SECRET}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
