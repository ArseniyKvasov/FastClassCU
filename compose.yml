      context: .
      dockerfile: analytics-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analytics
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./analytics-service/storage:/app/storage
      - ./auth-service/keys:/app/keys:ro
    restart: "no"

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/analytics
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
    ports:
      - "${ANALYTICS_PORT:-8010}:8000"
    depends_on:
      keys-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      analytics-migrate:
        condition: service_completed_successfully
    volumes:
      - ./analytics-service/storage:/app/storage
      - ./auth-service/keys:/app/keys:ro

  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    env_file: .env
    environment:
      AUTH_SERVICE_BASE_URL: http://auth-service:8000
      AUTH_SERVICE_PUBLIC_BASE_URL: ${AUTH_SERVICE_PUBLIC_BASE_URL:-http://localhost:8001}
      CONTENT_SERVICE_BASE_URL: http://content-service:8000
      CLASSROOM_SERVICE_BASE_URL: http://classroom-service:8000
      ASSIGNMENTS_SERVICE_BASE_URL: http://assignments-service:8000
      EVENT_BUS_REDIS_URL: redis://redis:6379/0
    ports:
      - "${FRONTEND_PORT:-8080}:8000"
    depends_on:
      keys-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      content-service:
        condition: service_started
      classroom-service:
        condition: service_started
      assignments-service:
        condition: service_started
    volumes:
      - ./auth-service/keys:/app/keys:ro

volumes:
  postgres_data:
