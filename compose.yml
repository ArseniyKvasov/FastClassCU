services:
  keys-init:
    image: python:3.12-slim
    working_dir: /src/auth-service
    volumes:
      - .:/src
    command: >
      sh -c 'pip install --quiet cryptography &&
      [ -f keys/private.pem ] || python scripts/generate_keys.py'
    restart: "no"

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - "${AUTH_DB_PORT:-5433}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck: &postgres_healthcheck
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-redis:
    image: redis:7-alpine
    ports:
      - "${AUTH_REDIS_PORT:-6386}:6379"
    healthcheck: &redis_healthcheck
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-migrate:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://auth:auth@auth-db:5432/auth
      EVENT_BUS_REDIS_URL: redis://analytics-redis:6379/0
      RATE_LIMIT_REDIS_URL: redis://auth-redis:6379/0
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      auth-db:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys
    restart: "no"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://auth:auth@auth-db:5432/auth
      EVENT_BUS_REDIS_URL: redis://analytics-redis:6379/0
      RATE_LIMIT_REDIS_URL: redis://auth-redis:6379/0
    ports:
      - "${AUTH_PORT:-8001}:8000"
    depends_on:
      keys-init:
        condition: service_completed_successfully
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    volumes:
      - ./auth-service/keys:/app/keys

  content-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: content
      POSTGRES_PASSWORD: content
      POSTGRES_DB: content
    ports:
      - "${CONTENT_DB_PORT:-5434}:5432"
    volumes:
      - content_db_data:/var/lib/postgresql/data
    healthcheck: *postgres_healthcheck

  content-redis:
    image: redis:7-alpine
    ports:
      - "${CONTENT_REDIS_PORT:-6383}:6379"
    healthcheck: *redis_healthcheck

  content-migrate:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://content:content@content-db:5432/content
      EVENT_BUS_REDIS_URL: redis://analytics-redis:6379/0
    command: ["alembic", "upgrade", "head"]
    depends_on:
      keys-init:
        condition: service_completed_successfully
      content-db:
        condition: service_healthy
    volumes:
      - ./auth-service/keys:/app/keys:ro
    restart: "no"

  content-service:
