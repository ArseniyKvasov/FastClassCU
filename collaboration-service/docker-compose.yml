services:
  collaboration-migrate:
    build:
      context: ..
      dockerfile: collaboration-service/Dockerfile
    env_file:
      - .env
    command: ["npm", "run", "migrate"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys
    restart: "no"

  collaboration-service:
    build:
      context: ..
      dockerfile: collaboration-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8007:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      collaboration-migrate:
        condition: service_completed_successfully
    volumes:
      - ./keys:/app/keys

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: collab
      POSTGRES_PASSWORD: collab
      POSTGRES_DB: collaboration
    ports:
      - "5439:5432"
    volumes:
      - collaboration_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6384:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  collaboration_db_data:
