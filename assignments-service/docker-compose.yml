services:
  assignments-service:
    build:
      context: ..
      dockerfile: assignments-service/Dockerfile
    env_file:
      - .env
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./keys:/app/keys

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assignments
      POSTGRES_PASSWORD: assignments
      POSTGRES_DB: assignments
    ports:
      - "5436:5432"
    volumes:
      - assignments_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assignments"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  assignments_db_data:
